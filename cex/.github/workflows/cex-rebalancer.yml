name: Shannon's Demon CEX Rebalancer

on:
  schedule:
    # Every 5 minutes — GitHub Actions minimum cron frequency.
    # The bot checks drift and skips if below threshold or in cooldown.
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Override DRY_RUN (true/false). Defaults to false for scheduled runs.'
        required: false
        default: 'true'

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: cex

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cex/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run rebalance check
        env:
          COINBASE_API_KEY_NAME: ${{ secrets.COINBASE_API_KEY_NAME }}
          COINBASE_API_KEY_PRIVATE_KEY: ${{ secrets.COINBASE_API_KEY_PRIVATE_KEY }}
          REBALANCE_THRESHOLD_BPS: ${{ vars.REBALANCE_THRESHOLD_BPS || '100' }}
          MAX_SLIPPAGE_BPS: ${{ vars.MAX_SLIPPAGE_BPS || '100' }}
          MIN_REBALANCE_INTERVAL_SECONDS: ${{ vars.MIN_REBALANCE_INTERVAL_SECONDS || '7200' }}
          MIN_PORTFOLIO_VALUE_USD: ${{ vars.MIN_PORTFOLIO_VALUE_USD || '50' }}
          MIN_TRADE_SIZE_USD: ${{ vars.MIN_TRADE_SIZE_USD || '5' }}
          POLL_INTERVAL_SECONDS: '300'
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          LOG_LEVEL: info
          TRADE_HISTORY_PATH: ./data/trade_history.json
        run: node dist/index.js --once
        timeout-minutes: 4

      - name: Upload trade history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-history-${{ github.run_number }}
          path: cex/data/trade_history.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "Shannon's Demon CEX bot failed",
              "attachments": [{
                "color": "danger",
                "text": "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
