name: Mercado Bitcoin Daily Scan

on:
  schedule:
    # Run at 20:00 UTC (17:00 BRT)
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bot/package-lock.json'

      - name: Download database artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb
          if_no_artifact_found: ignore

      - name: Create data directory
        run: mkdir -p ./bot/data/hype-mb

      - name: Install dependencies
        run: cd bot && npm ci

      - name: Create runtime config
        working-directory: ./bot
        run: |
          cat > shannonfi.config.yaml << 'EOF'
          exchange: mercadobitcoin
          dbPath: ./data/hype-mb/shannonfi.db
          mercadobitcoin:
            clientId: "${{ secrets.MB_CLIENT_ID }}"
            clientSecret: "${{ secrets.MB_CLIENT_SECRET }}"
          rebalanceThresholdBps: 100
          maxSlippageBps: 100
          useAdaptiveThreshold: true
          dryRun: false
          logLevel: info
          telegram:
            chatId: "${{ secrets.TELEGRAM_CHAT_ID }}"
          EOF

      - name: Build TypeScript
        working-directory: ./bot
        run: npm run build

      - name: Run scan
        working-directory: ./bot
        env:
          MB_CLIENT_ID: ${{ secrets.MB_CLIENT_ID }}
          MB_CLIENT_SECRET: ${{ secrets.MB_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: npm run scan -- --config shannonfi.config.yaml

      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb/shannonfi.db
          retention-days: 30
          overwrite: true
          if-no-files-found: ignore
