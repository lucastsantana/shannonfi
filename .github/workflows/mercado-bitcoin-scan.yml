name: Mercado Bitcoin Daily Scan

on:
  schedule:
    # Run at 20:00 UTC (5 PM BRT)
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bot/package-lock.json'

      - name: Download database artifact
        uses: dawidd6/action-download-artifact@v2
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb
          if_no_artifact_found: ignore

      - name: Create data directory
        run: mkdir -p ./bot/data/hype-mb

      - name: Install dependencies
        run: cd bot && npm ci

      - name: Create runtime config from secrets
        working-directory: ./bot
        run: |
          cat > shannonfi.config.yaml << 'EOF'
          exchange: mercadobitcoin
          mercadobitcoin:
            clientId: "${{ secrets.MB_CLIENT_ID }}"
            clientSecret: "${{ secrets.MB_CLIENT_SECRET }}"
          rebalanceThresholdBps: 100
          maxSlippageBps: 100
          useAdaptiveThreshold: true
          dryRun: false
          logLevel: info
          EOF

      - name: Build TypeScript
        working-directory: ./bot
        run: npm run build

      - name: Scan Mercado Bitcoin
        working-directory: ./bot
        run: |
          set -o pipefail
          npm run scan -- --config shannonfi.config.yaml 2>&1 | tee /tmp/mb-scan-output.log
        continue-on-error: true

      - name: Send completion notification
        uses: appleboy/telegram-action@master
        if: always()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            📊 Mercado Bitcoin Scan ${{ job.status == 'success' && '✅' || '❌' }}

            📅 Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            🔗 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb/shannonfi.db
          retention-days: 30
          overwrite: true
          if-no-files-found: ignore
