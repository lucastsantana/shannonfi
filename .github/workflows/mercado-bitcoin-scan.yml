name: Mercado Bitcoin Daily Scan

on:
  schedule:
    # Run at 20:00 UTC (5 PM BRT)
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bot/package-lock.json'

      - name: Download database artifact
        uses: dawidd6/action-download-artifact@v2
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb
          if_no_artifact_found: ignore

      - name: Create data directory
        run: mkdir -p ./bot/data/hype-mb

      - name: Install dependencies
        run: cd bot && npm ci

      - name: Create runtime config from secrets
        working-directory: ./bot
        run: |
          cat > shannonfi.config.yaml << 'EOF'
          exchange: mercadobitcoin
          dbPath: ./data/hype-mb/shannonfi.db
          mercadobitcoin:
            clientId: "${{ secrets.MB_CLIENT_ID }}"
            clientSecret: "${{ secrets.MB_CLIENT_SECRET }}"
          rebalanceThresholdBps: 100
          maxSlippageBps: 100
          useAdaptiveThreshold: true
          dryRun: false
          logLevel: info
          EOF

      - name: Build TypeScript
        working-directory: ./bot
        run: npm run build

      - name: Scan Mercado Bitcoin
        working-directory: ./bot
        id: scan
        env:
          MB_CLIENT_ID: ${{ secrets.MB_CLIENT_ID }}
          MB_CLIENT_SECRET: ${{ secrets.MB_CLIENT_SECRET }}
        run: |
          set -o pipefail
          npm run scan -- --config shannonfi.config.yaml 2>&1 | tee /tmp/mb-scan-output.log
        continue-on-error: true

      - name: Format scan results for Telegram
        id: parse-results
        run: |
          # Extract the Asset Scanner Results table from logs
          if [ ! -f /tmp/mb-scan-output.log ]; then
            echo "results=📊 Mercado Bitcoin Scan ✅" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Find and extract the scanner results section
          RESULTS=$(cat /tmp/mb-scan-output.log | grep -A 50 "Asset Scanner Results" | head -40)

          if [ -z "$RESULTS" ]; then
            echo "results=📊 Mercado Bitcoin Scan ✅" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Parse the table and format for Telegram
          {
            echo "🔍 <b>Asset Scanner — Mercado Bitcoin</b>"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "<b>Top Candidates</b>"
            echo ""

            # Extract asset rows from table
            echo "$RESULTS" | grep "^│.*│" | grep -v "Symbol" | grep -v "─" | head -10 | while IFS= read -r line; do
              # Parse: │  1 │ HYPE-BRL  │  4.0% │ + 86.0% │    R$184K │   0.07    │
              RANK=$(echo "$line" | cut -d'│' -f2 | xargs)
              SYMBOL=$(echo "$line" | cut -d'│' -f3 | xargs)
              MAD=$(echo "$line" | cut -d'│' -f4 | xargs)
              RETURN=$(echo "$line" | cut -d'│' -f5 | xargs)
              VOL=$(echo "$line" | cut -d'│' -f6 | xargs)
              SCORE=$(echo "$line" | cut -d'│' -f7 | xargs)

              if [ -n "$RANK" ] && [ -n "$SYMBOL" ]; then
                ASSET=$(echo "$SYMBOL" | cut -d'-' -f1)
                echo "${RANK}. <b>${ASSET}</b> — MAD: ${MAD} | Vol: ${VOL} | Score: ${SCORE}"
              fi
            done

            echo ""
            echo "⏰ <i>Daily scans: 20:00 UTC (15:00 BRT)</i>"
          } > /tmp/telegram-message.txt

          # Read the formatted message and escape for GitHub output
          MESSAGE=$(cat /tmp/telegram-message.txt)
          MESSAGE="${MESSAGE//$'\n'/\\n}"
          echo "results=$MESSAGE" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Send completion notification
        uses: appleboy/telegram-action@master
        if: always()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            📊 Mercado Bitcoin Scan ${{ job.status == 'success' && '✅' || '❌' }}

            ${{ steps.parse-results.outputs.results }}

      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb/shannonfi.db
          retention-days: 30
          overwrite: true
          if-no-files-found: ignore
