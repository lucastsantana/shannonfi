name: Monthly Database Backup

on:
  schedule:
    # Run on the 1st of each month at 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        instance:
          - hype-mb
          # - coinbase-btc   # uncomment once this instance is live

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download latest database artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          name: ${{ matrix.instance }}-database
          path: ./bot/data/${{ matrix.instance }}
          if_no_artifact_found: ignore

      - name: Create backup
        id: backup
        run: |
          if [ ! -f ./bot/data/${{ matrix.instance }}/shannonfi.db ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "exists=true" >> $GITHUB_OUTPUT
          BACKUP_DATE=$(date -u +'%Y-%m-%d')
          BACKUP_FILE="shannonfi-db-${{ matrix.instance }}-${BACKUP_DATE}.db"
          cp ./bot/data/${{ matrix.instance }}/shannonfi.db "$BACKUP_FILE"
          echo "file=$BACKUP_FILE" >> $GITHUB_OUTPUT
          echo "date=$BACKUP_DATE" >> $GITHUB_OUTPUT
          ls -lh "$BACKUP_FILE"

      - name: Create GitHub release with backup
        if: steps.backup.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: "Database Backup — ${{ matrix.instance }} — ${{ steps.backup.outputs.date }}"
          tag_name: "db-backup-${{ matrix.instance }}-${{ steps.backup.outputs.date }}"
          files: ${{ steps.backup.outputs.file }}
          body: |
            Monthly database backup for ${{ matrix.instance }} — ${{ steps.backup.outputs.date }}

            Contains trade history, tax events, cost basis, and portfolio snapshots.

      - name: Upload backup artifact
        if: steps.backup.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: monthly-backup-${{ matrix.instance }}-${{ steps.backup.outputs.date }}
          path: ${{ steps.backup.outputs.file }}
          retention-days: 180

      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        if: always()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            💾 Monthly Database Backup (${{ matrix.instance }}) ${{ steps.backup.outputs.exists == 'true' && '✅' || '⚠️ No DB found' }}
            📅 ${{ steps.backup.outputs.date }}
            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
