name: Seed Database
on:
  workflow_dispatch:
permissions:
  contents: read
  actions: write
jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Decode and restore database
        env:
          DB_SEED_GZ_B64: ${{ secrets.DB_SEED_GZ_B64 }}
        run: |
          mkdir -p ./bot/data/hype-mb
          echo "$DB_SEED_GZ_B64" | base64 -d | gunzip > ./bot/data/hype-mb/shannonfi.db
          echo "Restored $(du -h ./bot/data/hype-mb/shannonfi.db | cut -f1) database"
      - name: Upload as hype-mb-database artifact
        uses: actions/upload-artifact@v4
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb/shannonfi.db
          retention-days: 90
          overwrite: true
