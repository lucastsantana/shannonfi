name: Binance Daily Scan + Telegram Report

on:
  schedule:
    # Run at 21:00 UTC (6 PM BRT)
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode'
        required: false
        default: 'false'

permissions:
  contents: read
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bot/package-lock.json'

      - name: Download database artifact
        uses: dawidd6/action-download-artifact@v2
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb
          if_no_artifact_found: ignore

      - name: Create data directory
        run: mkdir -p ./bot/data/hype-mb

      - name: Install dependencies
        run: cd bot && npm ci

      - name: Create runtime config from secrets
        working-directory: ./bot
        run: |
          cat > shannonfi.config.yaml << 'EOF'
          exchange: mercadobitcoin
          dbPath: ./data/hype-mb/shannonfi.db
          mercadobitcoin:
            clientId: "${{ secrets.MB_CLIENT_ID }}"
            clientSecret: "${{ secrets.MB_CLIENT_SECRET }}"
          rebalanceThresholdBps: 100
          maxSlippageBps: 100
          minPortfolioValueBrl: 200
          minTradeSizeBrl: 20
          useAdaptiveThreshold: true
          thresholdVolatilityMultiplier: 1.5
          volatilityWindowDays: 30
          neverExceedExemptionLimit: false
          dryRun: ${{ github.event.inputs.dry_run || 'false' }}
          logLevel: info
          EOF

      - name: Build TypeScript
        working-directory: ./bot
        run: npm run build

      - name: Run Binance scan
        working-directory: ./bot
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
        run: |
          set -o pipefail
          npm run scan:binance -- --config shannonfi.config.yaml 2>&1 | tee /tmp/scan-output.log
        continue-on-error: true

      - name: Format scan results for Telegram
        id: parse-results
        run: |
          # Extract the Asset Scanner Results table from logs
          if [ ! -f /tmp/scan-output.log ]; then
            echo "results=­¤ōŖ Binance Daily Scan Ō£ģ" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Find and extract the scanner results section
          RESULTS=$(cat /tmp/scan-output.log | grep -A 50 "Asset Scanner Results" | head -40)

          if [ -z "$RESULTS" ]; then
            echo "results=­¤ōŖ Binance Daily Scan Ō£ģ" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Parse the table and format for Telegram
          {
            echo "­¤öŹ <b>Asset Scanner ŌĆö Binance</b>"
            echo "ŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöü"
            echo ""
            echo "<b>Top Candidates</b>"
            echo ""

            # Extract asset rows from table
            echo "$RESULTS" | grep "^Ōöé.*Ōöé" | grep -v "Symbol" | grep -v "ŌöĆ" | head -10 | while IFS= read -r line; do
              # Parse: Ōöé  1 Ōöé HYPE-BRL  Ōöé  4.0% Ōöé + 86.0% Ōöé    R$184K Ōöé   0.07    Ōöé
              RANK=$(echo "$line" | cut -d'Ōöé' -f2 | xargs)
              SYMBOL=$(echo "$line" | cut -d'Ōöé' -f3 | xargs)
              MAD=$(echo "$line" | cut -d'Ōöé' -f4 | xargs)
              RETURN=$(echo "$line" | cut -d'Ōöé' -f5 | xargs)
              VOL=$(echo "$line" | cut -d'Ōöé' -f6 | xargs)
              SCORE=$(echo "$line" | cut -d'Ōöé' -f7 | xargs)

              if [ -n "$RANK" ] && [ -n "$SYMBOL" ]; then
                ASSET=$(echo "$SYMBOL" | cut -d'-' -f1)
                echo "${RANK}. <b>${ASSET}</b> ŌĆö MAD: ${MAD} | Vol: ${VOL} | Score: ${SCORE}"
              fi
            done

            echo ""
            echo "ŌÅ░ <i>Daily scans: 21:00 UTC (16:00 BRT)</i>"
          } > /tmp/telegram-message.txt

          # Read the formatted message and escape for GitHub output
          MESSAGE=$(cat /tmp/telegram-message.txt)
          MESSAGE="${MESSAGE//$'\n'/\\n}"
          echo "results=$MESSAGE" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Send results to Telegram
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ­¤ōŖ Binance Daily Scan ${{ job.status == 'success' && 'Ō£ģ' || 'ŌØī' }}

            ${{ steps.parse-results.outputs.results }}

      - name: Upload updated database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb/shannonfi.db
          retention-days: 30
          overwrite: true
          if-no-files-found: ignore

      - name: Upload scan logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-logs-${{ github.run_number }}
          path: /tmp/scan-output.log
          retention-days: 7
          if-no-files-found: ignore
