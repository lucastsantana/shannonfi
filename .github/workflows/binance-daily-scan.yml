name: Binance Daily Scan + Telegram Report

on:
  schedule:
    # Run at 21:00 UTC (6 PM BRT)
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode'
        required: false
        default: 'false'

permissions:
  contents: read
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bot/package-lock.json'

      - name: Download database artifact
        uses: dawidd6/action-download-artifact@v2
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb
          if_no_artifact_found: ignore

      - name: Create data directory
        run: mkdir -p ./bot/data/hype-mb

      - name: Install dependencies
        run: cd bot && npm ci

      - name: Create runtime config from secrets
        working-directory: ./bot
        run: |
          cat > shannonfi.config.yaml << 'EOF'
          exchange: mercadobitcoin
          dbPath: ./data/hype-mb/shannonfi.db
          mercadobitcoin:
            clientId: "${{ secrets.MB_CLIENT_ID }}"
            clientSecret: "${{ secrets.MB_CLIENT_SECRET }}"
          rebalanceThresholdBps: 100
          maxSlippageBps: 100
          minPortfolioValueBrl: 200
          minTradeSizeBrl: 20
          useAdaptiveThreshold: true
          thresholdVolatilityMultiplier: 1.5
          volatilityWindowDays: 30
          neverExceedExemptionLimit: false
          dryRun: ${{ github.event.inputs.dry_run || 'false' }}
          logLevel: info
          EOF

      - name: Build TypeScript
        working-directory: ./bot
        run: npm run build

      - name: Run Binance scan
        working-directory: ./bot
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
        run: |
          set -o pipefail
          npm run scan:binance -- --config shannonfi.config.yaml 2>&1 | tee /tmp/scan-output.log
        continue-on-error: true

      - name: Parse scan results
        id: parse-results
        run: |
          if [ -f /tmp/scan-output.log ]; then
            SCAN_RESULTS=$(cat /tmp/scan-output.log | tail -50)
          else
            SCAN_RESULTS="No output captured"
          fi
          # Escape for JSON
          SCAN_RESULTS="${SCAN_RESULTS//$'\n'/\\n}"
          echo "results<<EOF" >> $GITHUB_OUTPUT
          echo "$SCAN_RESULTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Send success report to Telegram
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Binance Daily Scan Completed

            📅 Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            🔗 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send failure alert to Telegram
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Binance Daily Scan Failed

            📅 Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            🔗 View: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Upload updated database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb/shannonfi.db
          retention-days: 30
          overwrite: true
          if-no-files-found: ignore

      - name: Upload scan logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-logs-${{ github.run_number }}
          path: /tmp/scan-output.log
          retention-days: 7
          if-no-files-found: ignore
