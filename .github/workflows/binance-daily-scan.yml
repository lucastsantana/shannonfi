name: Binance Daily Scan

on:
  schedule:
    # Run at 21:00 UTC (6 PM BRT)
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode'
        required: false
        default: 'false'

permissions:
  contents: read
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bot/package-lock.json'

      - name: Download database artifact
        uses: dawidd6/action-download-artifact@v2
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb
          if_no_artifact_found: ignore

      - name: Create data directory
        run: mkdir -p ./bot/data/hype-mb

      - name: Install dependencies
        run: cd bot && npm ci

      - name: Create runtime config from secrets
        working-directory: ./bot
        run: |
          cat > shannonfi.config.yaml << 'EOF'
          exchange: binance
          dbPath: ./data/hype-mb/shannonfi.db
          binance: {}
          rebalanceThresholdBps: 100
          maxSlippageBps: 100
          useAdaptiveThreshold: true
          dryRun: ${{ github.event.inputs.dry_run || 'false' }}
          logLevel: info
          telegram:
            chatId: "${{ secrets.TELEGRAM_CHAT_ID }}"
          EOF

      - name: Build TypeScript
        working-directory: ./bot
        run: npm run build

      - name: Run Binance scan
        working-directory: ./bot
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: npm run scan:binance -- --config shannonfi.config.yaml

      - name: Upload updated database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb/shannonfi.db
          retention-days: 30
          overwrite: true
          if-no-files-found: ignore
