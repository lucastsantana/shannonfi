name: Daily Digest Email

on:
  schedule:
    # 00:30 AM BRT = 03:30 AM UTC
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: bot/data/shannonfi.db
          key: bot-sqlite-${{ github.repository }}
          restore-keys: |
            bot-sqlite-

      - name: Install dependencies (bot)
        working-directory: bot
        run: npm ci

      - name: Install dependencies (reporting)
        working-directory: reporting
        run: npm ci

      - name: Build (bot)
        working-directory: bot
        run: npm run build

      - name: Build (reporting)
        working-directory: reporting
        run: npm run build

      - name: Create config from secrets
        working-directory: bot
        run: |
          cat > shannonfi.config.yaml <<'EOF'
          exchange: mercadobitcoin

          mercadobitcoin:
            clientId: "${{ secrets.MB_CLIENT_ID }}"
            clientSecret: "${{ secrets.MB_CLIENT_SECRET }}"

          rebalanceThresholdBps: 100
          maxSlippageBps: 100
          minPortfolioValueBrl: 200
          minTradeSizeBrl: 20
          pollIntervalSeconds: 900
          minRebalanceIntervalSeconds: 7200

          useAdaptiveThreshold: true
          thresholdVolatilityMultiplier: 1.5
          volatilityWindowDays: 30

          neverExceedExemptionLimit: false
          dryRun: false
          logLevel: info

          dbPath: ./data/shannonfi.db
          jsonRetentionDays: 15

          smtp:
            host: smtp.mail.yahoo.com
            port: 587
            secure: false
            username: "${{ secrets.SMTP_USERNAME }}"
            password: "${{ secrets.SMTP_PASSWORD }}"
            recipientEmail: "${{ secrets.SMTP_RECIPIENT_EMAIL }}"
          EOF

      - name: Send daily digest
        working-directory: bot
        run: TZ=America/Sao_Paulo npm run daily-digest:built -- --config shannonfi.config.yaml
        continue-on-error: true

      - name: Save SQLite cache
        uses: actions/cache@v4
        if: always()
        with:
          path: bot/data/shannonfi.db
          key: bot-sqlite-${{ github.repository }}-${{ github.run_number }}

      - name: Notify Slack on failure
        if: failure() && vars.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ Daily Digest Email Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Daily Digest Email Failed*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }
