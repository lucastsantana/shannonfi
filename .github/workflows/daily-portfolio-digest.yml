name: Daily Portfolio Digest

on:
  schedule:
    # Run at 22:00 UTC (19:00 BRT) — after the MB scan
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download database artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb
          if_no_artifact_found: ignore

      - name: Create data directory
        run: mkdir -p ./bot/data/hype-mb

      - name: Generate Telegram digest message
        run: |
          DB="./bot/data/hype-mb/shannonfi.db"

          if [ ! -f "$DB" ]; then
            echo "⚠️ No database found — no trades recorded yet." > /tmp/digest.txt
            exit 0
          fi

          SYMBOL=$(sqlite3 "$DB" "SELECT value FROM db_config WHERE key = 'current_symbol' LIMIT 1;" 2>/dev/null || echo "SOL-BRL")
          BASE=$(echo "$SYMBOL" | cut -d'-' -f1)

          {
            echo "📈 <b>Daily Portfolio Digest</b>"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📅 $(date -u +'%Y-%m-%d') | Exchange: Mercado Bitcoin"
            echo ""

            # Latest snapshot
            sqlite3 "$DB" "
              SELECT
                '💰 <b>Portfolio</b>' || char(10) ||
                '  Total: R\$' || printf('%.2f', total_value_brl) || char(10) ||
                '  ${BASE}: ' || printf('%.6f', sol_balance) || char(10) ||
                '  BRL: R\$' || printf('%.2f', brl_balance) || char(10) ||
                '  Price: R\$' || printf('%.2f', sol_price) || char(10) ||
                '  Allocation: ' || printf('%.1f', sol_ratio_bps / 100.0) || '%'
              FROM portfolio_snapshots
              ORDER BY date_brt DESC LIMIT 1;
            " 2>/dev/null || echo "  No snapshot available"

            echo ""

            # Recent trades
            TRADES=$(sqlite3 "$DB" "
              SELECT
                '  ' || CASE direction WHEN 'BUY_BASE' THEN '🟢 BUY' ELSE '🔴 SELL' END ||
                ' ' || printf('%.6f', sol_amount_filled) || ' ${BASE}' ||
                ' @ R\$' || printf('%.2f', fill_price) ||
                ' (' || substr(trade_date_brt, 1, 10) || ')'
              FROM trades
              WHERE status = 'FILLED'
              ORDER BY timestamp DESC
              LIMIT 5;
            " 2>/dev/null)

            if [ -n "$TRADES" ]; then
              echo "🔁 <b>Recent Trades</b>"
              echo "$TRADES"
            else
              echo "🔁 <b>Recent Trades</b>"
              echo "  No filled trades yet"
            fi

            echo ""

            # Tax status
            sqlite3 "$DB" "
              SELECT
                '🧾 <b>Tax Status (' || strftime('%Y-%m', 'now') || ')</b>' || char(10) ||
                '  Sales: R\$' || printf('%.2f', COALESCE(SUM(traded_volume_brl), 0)) ||
                ' — ' || CASE WHEN COALESCE(SUM(traded_volume_brl), 0) <= 35000 THEN '✅ Exempt' ELSE '❌ Taxable' END
              FROM tax_events
              WHERE month_brt = strftime('%Y-%m', 'now');
            " 2>/dev/null || echo "🧾 Tax: No events this month"

          } > /tmp/digest.txt

          cat /tmp/digest.txt

      - name: Send digest to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message_file: /tmp/digest.txt

      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb/shannonfi.db
          retention-days: 30
          overwrite: true
          if-no-files-found: ignore
