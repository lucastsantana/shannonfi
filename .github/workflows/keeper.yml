name: Vault Keeper

on:
  schedule:
    # Run every hour. Since rebalances only occur every ~2 days (432,000 slots),
    # hourly checks are more than sufficient.
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  keeper:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install
          cd app && npm install

      - name: Build keeper
        run: |
          cd app
          npx tsc

      - name: Run keeper check
        env:
          RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          VAULT_AUTHORITY: ${{ secrets.VAULT_AUTHORITY }}
          KEEPER_SECRET_KEY: ${{ secrets.KEEPER_SECRET_KEY }}
          REBALANCE_INTERVAL: '432000'
        run: |
          cd app
          node dist/keeper.js
        timeout-minutes: 4

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Keeper check failed. Review logs.'
            })
