name: Rebalancer

# Runs the Shannon's Demon rebalancing bot on a 15-minute schedule, for every
# instance listed in the matrix below.
#
# ⚠️  If you also run an instance locally via PM2, stop it before enabling this
#     workflow for that instance to avoid two processes trading the same account
#     simultaneously:
#       pm2 stop <instance-name>
#
# Required secrets (only the ones relevant to the instances actually enabled below):
#   Mercado Bitcoin: MB_CLIENT_ID, MB_CLIENT_SECRET
#   Binance:         BINANCE_API_KEY, BINANCE_API_SECRET
#   Coinbase:        COINBASE_API_KEY_NAME, COINBASE_API_KEY_SECRET
# Optional: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        instance:
          - hype-mb
          # - coinbase-shannon-1   # uncomment once COINBASE_API_KEY_NAME/COINBASE_API_KEY_SECRET are set (see docs/coinbase-adapter-plan.md)
    concurrency:
      group: ${{ matrix.instance }}-database
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bot/package-lock.json

      - name: Download database
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ./bot/data/${{ matrix.instance }}
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?name=${{ matrix.instance }}-database&per_page=1" --jq '.artifacts[0].id // empty')
          if [ -n "$ARTIFACT_ID" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/db.zip
            unzip -o /tmp/db.zip -d ./bot/data/${{ matrix.instance }}/
            echo "Restored artifact $ARTIFACT_ID ($(du -h ./bot/data/${{ matrix.instance }}/shannonfi.db | cut -f1))"
          else
            echo "No artifact found, starting fresh"
          fi

      - name: Install dependencies
        run: cd bot && npm ci

      - name: Build
        working-directory: ./bot
        run: npm run build

      - name: Run rebalancer (single cycle)
        working-directory: ./bot
        env:
          MB_CLIENT_ID: ${{ secrets.MB_CLIENT_ID }}
          MB_CLIENT_SECRET: ${{ secrets.MB_CLIENT_SECRET }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          COINBASE_API_KEY_NAME: ${{ secrets.COINBASE_API_KEY_NAME }}
          COINBASE_API_KEY_SECRET: ${{ secrets.COINBASE_API_KEY_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: node dist/index.js --config configs/${{ matrix.instance }}.yaml --once

      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.instance }}-database
          path: ./bot/data/${{ matrix.instance }}/shannonfi.db
          retention-days: 90
          overwrite: true
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ⚠️ Rebalancer failed (${{ matrix.instance }})
            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
