name: Keeper Service (Long-Running)

on:
  # Trigger manually or on push to main
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/src/**'
      - '.github/workflows/keeper-long-running.yml'

jobs:
  keeper:
    # Use self-hosted runner for long-running processes
    # Requires: https://github.com/your-org/shannonfi/settings/actions/runners
    runs-on: [self-hosted, linux]
    timeout-minutes: 0  # No timeout for long-running

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install --prefer-offline
          cd app && npm install --prefer-offline

      - name: Build keeper
        run: |
          cd app
          npx tsc

      - name: Start keeper service
        env:
          RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          VAULT_AUTHORITY: ${{ secrets.VAULT_AUTHORITY }}
          KEEPER_SECRET_KEY: ${{ secrets.KEEPER_SECRET_KEY }}
          LOG_LEVEL: 'info'
          HEALTH_CHECK_PORT: '3000'
        run: |
          cd app
          node dist/keeper.js &
          KEEPER_PID=$!

          # Keep process alive, restart on failure
          while kill -0 $KEEPER_PID 2>/dev/null; do
            sleep 60
          done

          echo "Keeper process exited with code: $?"
          exit 1

      - name: Health check
        if: always()
        run: |
          # Check if keeper is responding on health port
          curl -f http://localhost:3000/health || exit 1

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: keeper-logs
          path: app/logs/
          retention-days: 7
