name: Fix Database (one-time)

# One-time workflow to correct a stale `current_symbol` (SOL-BRL, a leftover
# from before this instance was repurposed to trade HYPE-BRL) that the
# 2026-06-16 seed-database workflow carried into the hype-mb-database
# artifact, and the base_asset mislabeling (SOL instead of HYPE) it caused on
# every trade/snapshot row since. See chat history / commit for full context.
#
# Delete this file after running once.

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: hype-mb-database
      cancel-in-progress: false

    steps:
      - name: Download current database artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ./bot/data/hype-mb
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?name=hype-mb-database&per_page=1" --jq '.artifacts[0].id // empty')
          if [ -z "$ARTIFACT_ID" ]; then
            echo "No hype-mb-database artifact found — aborting."
            exit 1
          fi
          gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/db.zip
          unzip -o /tmp/db.zip -d ./bot/data/hype-mb/
          echo "Restored artifact $ARTIFACT_ID ($(du -h ./bot/data/hype-mb/shannonfi.db | cut -f1))"

      - name: Apply corrective SQL
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sqlite3
          echo "--- before ---"
          sqlite3 ./bot/data/hype-mb/shannonfi.db "select * from config;"
          sqlite3 ./bot/data/hype-mb/shannonfi.db "select base_asset, count(*) from trades group by base_asset;"
          sqlite3 ./bot/data/hype-mb/shannonfi.db "select base_asset, count(*) from portfolio_snapshots group by base_asset;"

          sqlite3 ./bot/data/hype-mb/shannonfi.db <<'EOF'
          UPDATE config SET value = 'HYPE-BRL' WHERE key = 'current_symbol';
          UPDATE trades SET base_asset = 'HYPE' WHERE base_asset = 'SOL' AND exchange = 'mercadobitcoin';
          UPDATE portfolio_snapshots SET base_asset = 'HYPE' WHERE base_asset = 'SOL' AND exchange = 'mercadobitcoin';
          EOF

          echo "--- after ---"
          sqlite3 ./bot/data/hype-mb/shannonfi.db "select * from config;"
          sqlite3 ./bot/data/hype-mb/shannonfi.db "select base_asset, count(*) from trades group by base_asset;"
          sqlite3 ./bot/data/hype-mb/shannonfi.db "select base_asset, count(*) from portfolio_snapshots group by base_asset;"

      - name: Upload fixed database artifact
        uses: actions/upload-artifact@v4
        with:
          name: hype-mb-database
          path: ./bot/data/hype-mb/shannonfi.db
          retention-days: 90
          overwrite: true
