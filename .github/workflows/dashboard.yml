name: Dashboard

# Generates the portfolio dashboard for every instance listed below and deploys
# them all to GitHub Pages in one run. Triggers automatically after each
# Rebalancer run, and every 6 hours as a fallback (keeps the page fresh even
# without a rebalance).
#
# Single job, not a matrix: GitHub Pages allows exactly one deploy step per
# workflow run, so every instance's dashboard is generated sequentially into its
# own sub-path of the same `public/` tree, then deployed together. hype-mb is kept
# at the site root (public/index.html) for URL backward-compatibility; every other
# instance gets public/<instance>/index.html.
#
# One-time setup required:
#   GitHub repo → Settings → Pages → Source: GitHub Actions

on:
  workflow_run:
    workflows: ["Rebalancer"]
    types: [completed]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bot/package-lock.json

      - name: Install dependencies
        run: cd bot && npm ci

      - name: Build
        working-directory: ./bot
        run: npm run build

      - name: Generate and publish each instance's dashboard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p public

          # hype-mb: site root, for URL backward-compatibility.
          # Add further instances here as "instance:subpath" pairs — leave
          # subpath empty ("") for the one instance that should live at the root.
          declare -A INSTANCES=(
            ["hype-mb"]=""
            # ["coinbase-btc"]="coinbase-btc"   # uncomment once this instance is live
          )

          for instance in "${!INSTANCES[@]}"; do
            subpath="${INSTANCES[$instance]}"
            echo "=== $instance -> public/${subpath} ==="

            mkdir -p "./bot/data/${instance}"
            ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?name=${instance}-database&per_page=1" --jq '.artifacts[0].id // empty')
            if [ -n "$ARTIFACT_ID" ]; then
              gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/db-${instance}.zip
              unzip -o /tmp/db-${instance}.zip -d "./bot/data/${instance}/"
              echo "Restored artifact $ARTIFACT_ID ($(du -h ./bot/data/${instance}/shannonfi.db | cut -f1))"
            else
              echo "No artifact found for ${instance}, generating empty dashboard"
            fi

            (cd bot && node dist/publishers/dashboard.js --config "configs/${instance}.yaml")

            destdir="public/${subpath}"
            mkdir -p "$destdir"
            cp "./bot/data/${instance}/dashboard.html" "${destdir}/index.html"
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
