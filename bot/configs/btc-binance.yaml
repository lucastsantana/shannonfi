# ─────────────────────────────────────────────────────────────────────────────
# BTC-BRL on Binance — Shannon's Demon
# ─────────────────────────────────────────────────────────────────────────────

exchange: binance
symbol: BTC-BRL

# Binance API configuration
# Credentials (apiKey, apiSecret) are loaded directly from GNOME Keyring at runtime.
# See bot/src/core/keyring.ts for credential loading details.
#
# Optional: uncomment binance section to override API endpoint
# binance:
#   apiBaseUrl: "https://api.binance.com"

# ─── Strategy parameters ──────────────────────────────────────────────────────
# Aligned with HYPE-BRL instance for consistent rebalancing behavior

rebalanceThresholdBps: 100        # 1.0% static threshold
maxSlippageBps: 100               # 1.0% max slippage
minPortfolioValueBrl: 10          # Skip if portfolio < R$10
minTradeSizeBrl: 1                # Skip trades < R$1
pollIntervalSeconds: 300          # Check every 5 minutes
minRebalanceIntervalSeconds: 300  # Min 5 min between rebalances

# ─── Adaptive threshold ────────────────────────────────────────────────────────
# Volatility-responsive thresholds for dynamic markets

useAdaptiveThreshold: true
thresholdVolatilityMultiplier: 1.25
volatilityWindowDays: 30

# ─── Safeguards ───────────────────────────────────────────────────────────────
# enableDayTradeSafeguard: Prevent same-day opposite trades (BUY then SELL, or vice versa)
# on the same BRT calendar day. Defaults to true for tax safety.
enableDayTradeSafeguard: true

# ─── Runtime ──────────────────────────────────────────────────────────────────

dryRun: false
logLevel: info

# ─── Data persistence (SEPARATE FROM OTHER INSTANCES) ──────────────────────────
# Each instance has its own database and JSON backups to prevent data mixing

dbPath: ./data/btc-binance/shannonfi.db
jsonRetentionDays: 15

# ─── Telegram notifications (optional) ──────────────────────────────────────────
# Send real-time trade notifications to Telegram.
# Bot token is loaded from GNOME Keyring at runtime (see docs for setup).
#
# telegram:
#   chatId: "123456789"
