name: Shannon's Demon Rebalancer

on:
  schedule:
    # Every 15 minutes — matches pollIntervalSeconds: 900 in config.
    # Each run costs 1 price request on the happy path (no rebalance needed).
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Override dryRun. Defaults to false for scheduled runs.'
        required: false
        default: 'true'

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: bot

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bot/package-lock.json

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            bot/data/trade_history.json
            bot/data/cost_basis.json
            bot/data/tax_events.json
            bot/data/portfolio_snapshots.json
          key: bot-data-${{ github.repository }}
          restore-keys: bot-data-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Write config from secrets
        run: |
          cat > shannonfi.config.yaml << 'EOF'
          exchange: ${{ vars.EXCHANGE }}

          coinbase:
            apiKeyName: "${{ secrets.COINBASE_API_KEY_NAME }}"
            privateKey: "${{ secrets.COINBASE_API_KEY_PRIVATE_KEY }}"

          mercadobitcoin:
            clientId: "${{ secrets.MB_CLIENT_ID }}"
            clientSecret: "${{ secrets.MB_CLIENT_SECRET }}"

          rebalanceThresholdBps: ${{ vars.REBALANCE_THRESHOLD_BPS || 100 }}
          maxSlippageBps: ${{ vars.MAX_SLIPPAGE_BPS || 100 }}
          minPortfolioValueBrl: ${{ vars.MIN_PORTFOLIO_VALUE_BRL || 200 }}
          minTradeSizeBrl: ${{ vars.MIN_TRADE_SIZE_BRL || 20 }}
          pollIntervalSeconds: 900
          minRebalanceIntervalSeconds: ${{ vars.MIN_REBALANCE_INTERVAL_SECONDS || 7200 }}

          useAdaptiveThreshold: ${{ vars.USE_ADAPTIVE_THRESHOLD || true }}
          thresholdVolatilityMultiplier: ${{ vars.THRESHOLD_VOLATILITY_MULTIPLIER || 1.5 }}
          volatilityWindowDays: ${{ vars.VOLATILITY_WINDOW_DAYS || 30 }}

          neverExceedExemptionLimit: ${{ vars.NEVER_EXCEED_EXEMPTION_LIMIT || false }}

          dryRun: ${{ github.event.inputs.dry_run || false }}
          logLevel: info

          tradeHistoryPath: ./data/trade_history.json
          portfolioSnapshotsPath: ./data/portfolio_snapshots.json
          costBasisPath: ./data/cost_basis.json
          taxEventsPath: ./data/tax_events.json
          EOF

      - name: Run rebalance check
        run: node dist/index.js --once
        timeout-minutes: 4

      - name: Upload data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-data-${{ github.run_number }}
          path: |
            bot/data/trade_history.json
            bot/data/cost_basis.json
            bot/data/tax_events.json
            bot/data/portfolio_snapshots.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "Shannon's Demon bot failed",
              "attachments": [{
                "color": "danger",
                "text": "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
