name: Shannon's Demon Monthly Report

on:
  schedule:
    # 06:00 UTC = 03:00 BRT on the 1st of every month
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Report month (YYYY-MM). Defaults to previous calendar month.'
        required: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: bot

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bot/package-lock.json

      - name: Restore SQLite database
        uses: actions/cache@v4
        with:
          path: bot/data/shannonfi.db
          key: bot-sqlite-${{ github.repository }}
          restore-keys: bot-sqlite-

      - name: Restore JSON backup cache (fallback if SQLite cache miss)
        uses: actions/cache@v4
        with:
          path: |
            bot/data/trade_history.json
            bot/data/cost_basis.json
            bot/data/tax_events.json
            bot/data/portfolio_snapshots.json
          key: bot-data-${{ github.repository }}
          restore-keys: bot-data-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Write config from secrets
        run: |
          cat > shannonfi.config.yaml << 'EOF'
          exchange: mercadobitcoin

          mercadobitcoin:
            clientId: "${{ secrets.MB_CLIENT_ID }}"
            clientSecret: "${{ secrets.MB_CLIENT_SECRET }}"

          rebalanceThresholdBps: 100
          maxSlippageBps: 100
          minPortfolioValueBrl: 200
          minTradeSizeBrl: 20
          pollIntervalSeconds: 900
          minRebalanceIntervalSeconds: 7200
          useAdaptiveThreshold: true
          thresholdVolatilityMultiplier: 1.5
          volatilityWindowDays: 30
          neverExceedExemptionLimit: false
          dryRun: false
          logLevel: info

          dbPath: ./data/shannonfi.db
          jsonRetentionDays: 15

          anthropicApiKey: "${{ secrets.ANTHROPIC_API_KEY }}"
          EOF

      - name: Generate monthly report
        run: |
          MONTH_ARG=""
          if [ -n "${{ github.event.inputs.month }}" ]; then
            MONTH_ARG="--month ${{ github.event.inputs.month }}"
          fi
          TZ=America/Sao_Paulo node dist/scripts/monthly-report.js $MONTH_ARG
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: monthly-report-${{ github.run_number }}
          path: bot/data/reports/*.md
          retention-days: 365
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "Shannon's Demon monthly report generation failed",
              "attachments": [{
                "color": "danger",
                "text": "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
